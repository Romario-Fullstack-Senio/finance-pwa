<article
  class="rounded-2xl border border-white/10 bg-slate-900/70 p-5 shadow-lg shadow-black/15 backdrop-blur xl:col-span-4"
>
  <h3 class="mb-3 text-lg font-semibold text-white">Categorías</h3>
  <form [formGroup]="form" (ngSubmit)="submit()" autocomplete="off" class="space-y-3">
    <div class="grid gap-3 sm:grid-cols-[1fr_auto_auto]">
      <input
        type="text"
        formControlName="name"
        name="categoryName"
        placeholder="Nueva categoría"
        autocomplete="off"
        class="w-full rounded-xl border border-slate-700 bg-slate-950/70 px-3 py-2.5 text-sm text-slate-100 placeholder:text-slate-500 focus:border-cyan-400 focus:outline-none focus:ring-2 focus:ring-cyan-500/40"
      />
      <input
        type="color"
        formControlName="color"
        name="categoryColor"
        class="h-11 w-full rounded-xl border border-slate-700 bg-slate-950/70 p-1 sm:w-14"
      />
      <button
        type="submit"
        [disabled]="loading()"
        class="rounded-xl bg-cyan-500 px-4 py-2.5 text-sm font-semibold text-slate-950 transition hover:bg-cyan-400 disabled:opacity-60"
      >
        Agregar
      </button>
    </div>
  </form>

  <ul class="mt-4 grid gap-2 sm:grid-cols-2">
    @for (category of categories(); track category.id) {
      <li
        class="inline-flex min-w-0 items-center gap-2 rounded-full border border-slate-700 bg-slate-800/80 px-3 py-1.5 text-xs font-medium text-slate-200"
      >
        <span
          class="h-3 w-3 shrink-0 rounded-full border border-white/30"
          [style.background]="category.color"
        ></span>
        <span class="truncate">{{ category.name }}</span>
      </li>
    }
  </ul>
</article>
