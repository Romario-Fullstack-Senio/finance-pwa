<section class="grid gap-4 md:grid-cols-3">
  <article
    class="rounded-2xl border border-white/10 bg-slate-900/70 p-5 shadow-lg shadow-black/15 backdrop-blur"
  >
    <h2 class="text-base font-semibold text-slate-200">Ingresos</h2>
    <p class="mt-2 text-4xl font-bold text-cyan-300">{{ totalIncome() | copCurrency }}</p>
  </article>
  <article
    class="rounded-2xl border border-white/10 bg-slate-900/70 p-5 shadow-lg shadow-black/15 backdrop-blur"
  >
    <h2 class="text-base font-semibold text-slate-200">Gastos</h2>
    <p class="mt-2 text-4xl font-bold text-rose-300">{{ totalExpense() | copCurrency }}</p>
  </article>
  <article
    class="rounded-2xl border border-white/10 bg-slate-900/70 p-5 shadow-lg shadow-black/15 backdrop-blur"
  >
    <h2 class="text-base font-semibold text-slate-200">Balance</h2>
    <p
      class="mt-2 text-4xl font-bold"
      [class.text-cyan-300]="balance() >= 0"
      [class.text-rose-300]="balance() < 0"
    >
      {{ balance() | copCurrency }}
    </p>
  </article>
</section>
