<div
  class="relative flex min-h-screen items-center justify-center overflow-hidden bg-slate-950 px-4"
>
  <!-- Fondo decorativo -->
  <div class="pointer-events-none absolute inset-0">
    <div class="absolute -left-20 top-0 h-80 w-80 rounded-full bg-cyan-500/20 blur-3xl"></div>
    <div class="absolute right-0 top-20 h-96 w-96 rounded-full bg-indigo-500/20 blur-3xl"></div>
    <div class="absolute bottom-0 left-1/3 h-72 w-72 rounded-full bg-rose-500/20 blur-3xl"></div>
  </div>

  <div class="relative z-10 w-full max-w-md">
    <!-- Logo / título -->
    <div class="mb-8 text-center">
      <div
        class="mx-auto mb-4 flex h-14 w-14 items-center justify-center rounded-2xl bg-gradient-to-br from-cyan-400 to-indigo-500 shadow-lg shadow-cyan-500/30"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-7 w-7 text-white"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="2"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
          />
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-white">Finance PWA</h1>
      <p class="mt-1 text-sm text-slate-400">Inicia sesión para continuar</p>
    </div>

    <!-- Tarjeta -->
    <div
      class="rounded-3xl border border-white/10 bg-slate-900/80 p-8 shadow-2xl shadow-black/30 backdrop-blur"
    >
      <form [formGroup]="form" (ngSubmit)="submit()" novalidate class="space-y-5">
        <!-- Email -->
        <div class="space-y-1.5">
          <label
            for="loginEmail"
            class="text-xs font-semibold uppercase tracking-widest text-slate-400"
          >
            Correo electrónico
          </label>
          <input
            id="loginEmail"
            type="email"
            formControlName="email"
            autocomplete="email"
            placeholder="tú@correo.com"
            class="w-full rounded-xl border border-slate-700 bg-slate-950/70 px-4 py-3 text-sm text-slate-100 placeholder:text-slate-500 transition focus:border-cyan-400 focus:outline-none focus:ring-2 focus:ring-cyan-500/40"
            [class.border-rose-500]="form.get('email')?.invalid && form.get('email')?.touched"
          />
          @if (form.get('email')?.invalid && form.get('email')?.touched) {
            <p class="text-xs text-rose-400">Ingresa un correo válido.</p>
          }
        </div>

        <!-- Contraseña con ojo -->
        <div class="space-y-1.5">
          <label
            for="loginPassword"
            class="text-xs font-semibold uppercase tracking-widest text-slate-400"
          >
            Contraseña
          </label>
          <div class="relative">
            <input
              id="loginPassword"
              [type]="showPassword() ? 'text' : 'password'"
              formControlName="password"
              autocomplete="current-password"
              placeholder="••••••••"
              class="w-full rounded-xl border border-slate-700 bg-slate-950/70 px-4 py-3 pr-12 text-sm text-slate-100 placeholder:text-slate-500 transition focus:border-cyan-400 focus:outline-none focus:ring-2 focus:ring-cyan-500/40"
              [class.border-rose-500]="
                form.get('password')?.invalid && form.get('password')?.touched
              "
            />
            <button
              type="button"
              (click)="togglePassword()"
              aria-label="Mostrar u ocultar contraseña"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 transition hover:text-slate-200"
            >
              @if (showPassword()) {
                <!-- Ojo tachado (ocultar) -->
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  class="h-5 w-5"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"
                  />
                </svg>
              } @else {
                <!-- Ojo abierto (mostrar) -->
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  class="h-5 w-5"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                  />
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                  />
                </svg>
              }
            </button>
          </div>
          @if (form.get('password')?.invalid && form.get('password')?.touched) {
            <p class="text-xs text-rose-400">Mínimo 6 caracteres.</p>
          }
        </div>

        <!-- Botón submit -->
        <button
          type="submit"
          [disabled]="loading()"
          class="w-full rounded-xl bg-gradient-to-r from-cyan-500 to-indigo-500 py-3 text-sm font-bold text-white shadow-lg shadow-cyan-500/20 transition hover:from-cyan-400 hover:to-indigo-400 disabled:cursor-not-allowed disabled:opacity-60"
        >
          @if (loading()) {
            <span class="inline-flex items-center gap-2">
              <span
                class="h-4 w-4 animate-spin rounded-full border-2 border-white/30 border-t-white"
              ></span>
              Iniciando...
            </span>
          } @else {
            Iniciar sesión
          }
        </button>
      </form>

      <p class="mt-6 text-center text-sm text-slate-400">
        ¿No tienes cuenta?
        <a
          routerLink="/register"
          class="font-semibold text-cyan-400 transition hover:text-cyan-300"
        >
          Regístrate
        </a>
      </p>
    </div>
  </div>
</div>
