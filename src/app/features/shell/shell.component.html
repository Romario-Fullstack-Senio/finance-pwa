<div class="relative min-h-screen w-full bg-slate-950 text-slate-100">
  <!-- Fondo decorativo — overflow-hidden AQUÍ para no clipar el dropdown -->
  <div class="pointer-events-none absolute inset-0 overflow-hidden">
    <div class="absolute -left-20 top-0 h-80 w-80 rounded-full bg-cyan-500/20 blur-3xl"></div>
    <div class="absolute right-0 top-20 h-96 w-96 rounded-full bg-indigo-500/20 blur-3xl"></div>
    <div class="absolute bottom-0 left-1/3 h-72 w-72 rounded-full bg-rose-500/20 blur-3xl"></div>
  </div>

  <div class="relative z-10 w-full px-4 py-6 sm:px-6 lg:px-10 xl:px-14">
    @if (loading()) {
      <div class="grid min-h-screen place-content-center text-center text-slate-200">
        <div
          class="mx-auto mb-4 h-10 w-10 animate-spin rounded-full border-4 border-slate-700 border-t-cyan-400"
        ></div>
        <p class="text-lg font-semibold">Cargando datos...</p>
      </div>
    } @else {
      <!-- Header con avatar y export -->
      <div class="mb-5 flex flex-wrap items-center gap-3">
        <div class="flex-1">
          <app-shell-header />
        </div>
        <button
          type="button"
          (click)="exportCsv()"
          class="rounded-xl border border-violet-400/60 bg-violet-500/90 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-violet-400"
        >
          Exportar CSV
        </button>
      </div>

      <!-- Resumen balance -->
      <app-balance-summary class="mt-2 block" />

      <!-- Sección principal de formularios -->
      <section class="mt-5 grid gap-4 xl:grid-cols-12">
        <app-budget-form class="contents" />
        <app-transaction-form class="contents" />
        <app-category-form class="contents" />
      </section>

      <!-- Tabla y tendencia -->
      <section class="mt-5 grid gap-4 xl:grid-cols-[1.7fr_1fr]">
        <app-transactions-table />
        <app-six-month-trend />
      </section>
    }
  </div>
</div>
