<header
  class="flex items-center justify-between gap-4 rounded-3xl border border-white/10 bg-slate-900/70 px-6 py-4 shadow-2xl shadow-black/20 backdrop-blur"
>
  <!-- Título -->
  <div>
    <p class="text-xs font-semibold uppercase tracking-[0.22em] text-cyan-300">PWA de finanzas</p>
    <h1 class="text-xl font-bold text-white sm:text-2xl">Control mensual</h1>
  </div>

  <!-- Perfil de usuario -->
  <div class="relative">
    <!-- Input oculto para subir avatar -->
    <input
      id="avatarInput"
      type="file"
      accept="image/*"
      class="hidden"
      (change)="onAvatarChange($event)"
    />

    <button
      #menuTrigger
      type="button"
      (click)="toggleMenu()"
      class="relative flex items-center gap-3 rounded-2xl border border-white/10 bg-slate-800/60 px-3 py-2 transition hover:bg-slate-700/60"
      aria-haspopup="menu"
      [attr.aria-expanded]="menuOpen()"
    >
      <!-- Avatar -->
      <div class="relative h-9 w-9 shrink-0">
        @if (uploading()) {
          <div
            class="flex h-9 w-9 items-center justify-center rounded-full border border-white/10 bg-slate-700"
          >
            <span
              class="h-4 w-4 animate-spin rounded-full border-2 border-slate-400 border-t-cyan-400"
            ></span>
          </div>
        } @else if (authService.user()?.avatarUrl) {
          <img
            [src]="authService.user()!.avatarUrl!"
            alt="Avatar"
            class="h-9 w-9 rounded-full object-cover ring-2 ring-cyan-500/40"
          />
        } @else {
          <div
            class="flex h-9 w-9 items-center justify-center rounded-full bg-gradient-to-br from-cyan-500 to-indigo-600 text-sm font-bold text-white ring-2 ring-cyan-500/40"
          >
            {{ (authService.user()?.email ?? 'U')[0].toUpperCase() }}
          </div>
        }
      </div>

      <!-- Email abreviado (visible en md+) -->
      <span class="hidden max-w-[140px] truncate text-sm text-slate-300 md:block">
        {{ authService.user()?.email }}
      </span>

      <!-- Chevron -->
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-4 w-4 text-slate-400 transition-transform duration-200"
        [class.rotate-180]="menuOpen()"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
        stroke-width="2"
      >
        <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
      </svg>
    </button>
  </div>
</header>

@if (menuOpen()) {
  <div class="fixed inset-0 z-[9998]" (click)="menuOpen.set(false)"></div>

  <div
    class="fixed z-[9999] w-52 overflow-hidden rounded-2xl border border-white/10 bg-slate-900 shadow-2xl shadow-black/40"
    [style.top.px]="getMenuTop()"
    [style.left.px]="getMenuLeft()"
  >
    <div class="border-b border-white/10 px-4 py-3">
      <p class="truncate text-xs text-slate-400">{{ authService.user()?.email }}</p>
    </div>

    <button
      type="button"
      (click)="triggerAvatarUpload(); menuOpen.set(false)"
      class="flex w-full items-center gap-3 px-4 py-3 text-sm text-slate-300 transition hover:bg-slate-800 hover:text-white"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-4 w-4 text-cyan-400"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
        stroke-width="2"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"
        />
      </svg>
      Cambiar foto de perfil
    </button>

    <button
      type="button"
      (click)="signOut(); menuOpen.set(false)"
      class="flex w-full items-center gap-3 px-4 py-3 text-sm text-rose-400 transition hover:bg-slate-800 hover:text-rose-300"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-4 w-4"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
        stroke-width="2"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
        />
      </svg>
      Cerrar sesión
    </button>
  </div>
}
