name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build for Pages
        run: npm run build -- --configuration production --base-href "/${{ github.event.repository.name }}/"

      - name: Detect build output
        run: |
          if [ -d "dist/finance-pwa/browser" ]; then
            echo "PAGES_DIR=dist/finance-pwa/browser" >> "$GITHUB_ENV"
          else
            echo "PAGES_DIR=dist/finance-pwa" >> "$GITHUB_ENV"
          fi

      - name: Prepare SPA fallback
        run: cp "$PAGES_DIR/index.html" "$PAGES_DIR/404.html"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.PAGES_DIR }}

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
