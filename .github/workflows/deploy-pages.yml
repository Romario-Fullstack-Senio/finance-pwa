name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build for Pages
        run: npm run build -- --configuration production --base-href "/${{ github.event.repository.name }}/"

      - name: Detect build output
        run: |
          if [ -d "dist/finance-pwa/browser" ]; then
            echo "PAGES_DIR=dist/finance-pwa/browser" >> "$GITHUB_ENV"
          else
            echo "PAGES_DIR=dist/finance-pwa" >> "$GITHUB_ENV"
          fi

      - name: Prepare SPA fallback
        run: cp "$PAGES_DIR/index.html" "$PAGES_DIR/404.html"

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ env.PAGES_DIR }}
          publish_branch: gh-pages
